upstream api_backend {
    # Docker's internal DNS will round-robin across all instances of the 'api' service
    # if we scale it using `docker-compose up --scale api=3`
    server api:8000;
}

upstream frontend_app {
    server frontend:80; # Assuming frontend serves via its own simple nginx or vite preview
}

server {
    listen 80;
    server_name localhost;

    # Load Balance API requests
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route all other traffic to Frontend
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

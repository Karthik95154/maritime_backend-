version: "3.8"

services:
  # Nginx Gateway / Load Balancer
  nginx:
    image: nginx:alpine
    container_name: maritime_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - api
      - frontend
    networks:
      - maritime_net

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maritime_frontend
    networks:
      - maritime_net

  # FastAPI Backend (Can be scaled via docker-compose up --scale api=3)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://admin:secure_password@mongodb:27017
      - MARITIME_AUTOSTART_MICROSERVICES=1
    # Note: no container_name here so we can scale this service!
    ports:
      - "8000" # Let Docker randomly assign host ports for load balancing
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
    networks:
      - maritime_net

  # MongoDB (Single instance for Mini Org)
  mongodb:
    image: mongo:6.0
    container_name: maritime_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password
    volumes:
      - mongo_data:/data/db
    networks:
      - maritime_net

  # --- New Local Safe Infrastructure ---

  # Redis for caching API responses and rate limiting
  redis:
    image: redis:7-alpine
    container_name: maritime_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - maritime_net

  # MinIO for Object Storage (Video uploads, images, reports)
  minio:
    image: minio/minio
    container_name: maritime_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: secure_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - maritime_net

  # Qdrant for Vector Embeddings (CLIP similarities)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: maritime_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - maritime_net

  # Kafka (KRaft mode, no Zookeeper needed) for async events
  kafka:
    image: bitnami/kafka:3.5
    container_name: maritime_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - maritime_net

networks:
  maritime_net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  minio_data:
  qdrant_data:
  kafka_data:

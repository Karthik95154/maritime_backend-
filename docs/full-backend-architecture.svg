<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1450" viewBox="0 0 2400 1450">
  <defs>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 28; }
      .section { font: 800 18px Arial, sans-serif; fill: #0f172a; letter-spacing: 0.6px; }
      .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 18; }
      .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 18; }
      .green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 18; }
      .amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 18; }
      .purple { fill: #faf5ff; stroke: #7c3aed; stroke-width: 2; rx: 18; }
      .rose { fill: #fff1f2; stroke: #e11d48; stroke-width: 2; rx: 18; }
      .slate { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 18; }
      .header { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 13px Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .micro { font: 400 11px Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .arrowGreen { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arrowGreen); }
      .arrowAmber { stroke: #f59e0b; stroke-width: 3; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrowAmber); }
      .arrowPurple { stroke: #7c3aed; stroke-width: 4; fill: none; marker-end: url(#arrowPurple); }
      .pill { fill: #e2e8f0; rx: 12; }
      .note { font: 700 12px Arial, sans-serif; fill: #0f172a; }
    </style>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="2400" height="1450" fill="#ffffff"/>
  <text x="1200" y="56" text-anchor="middle" class="title">MaritimeInspect Full Backend Architecture</text>
  <text x="1200" y="88" text-anchor="middle" class="subtitle">Auth, uploads, workflow orchestration, dummy AI microservices, human review, traceability, and analytics</text>

  <!-- Top row -->
  <rect x="40" y="120" width="2320" height="150" class="lane"/>
  <text x="70" y="154" class="section">ACCESS LAYER</text>
  <rect x="70" y="178" width="250" height="70" class="blue"/>
  <text x="195" y="206" text-anchor="middle" class="header">User Login</text>
  <text x="195" y="228" text-anchor="middle" class="body">Customer / Admin</text>
  <rect x="350" y="178" width="250" height="70" class="blue"/>
  <text x="475" y="206" text-anchor="middle" class="header">Internal Review Login</text>
  <text x="475" y="228" text-anchor="middle" class="body">Reviewer / Engineer</text>
  <rect x="630" y="178" width="250" height="70" class="green"/>
  <text x="755" y="206" text-anchor="middle" class="header">Frontend UI</text>
  <text x="755" y="228" text-anchor="middle" class="body">React + route guards</text>
  <rect x="910" y="178" width="250" height="70" class="purple"/>
  <text x="1035" y="206" text-anchor="middle" class="header">API Gateway</text>
  <text x="1035" y="228" text-anchor="middle" class="body">CORS, auth, throttling</text>
  <rect x="1190" y="178" width="250" height="70" class="amber"/>
  <text x="1315" y="206" text-anchor="middle" class="header">FastAPI Core API</text>
  <text x="1315" y="228" text-anchor="middle" class="body">Route orchestration</text>
  <rect x="1470" y="178" width="250" height="70" class="slate"/>
  <text x="1595" y="206" text-anchor="middle" class="header">Request Trace</text>
  <text x="1595" y="228" text-anchor="middle" class="body">Correlation ID + logs</text>
  <rect x="1750" y="178" width="250" height="70" class="slate"/>
  <text x="1875" y="206" text-anchor="middle" class="header">WebSocket / SSE</text>
  <text x="1875" y="228" text-anchor="middle" class="body">Progress stream</text>
  <rect x="2030" y="178" width="250" height="70" class="green"/>
  <text x="2155" y="206" text-anchor="middle" class="header">UI Feedback</text>
  <text x="2155" y="228" text-anchor="middle" class="body">Progress, review, reports</text>

  <path d="M320 213 L350 213" class="arrow"/>
  <path d="M600 213 L630 213" class="arrow"/>
  <path d="M880 213 L910 213" class="arrow"/>
  <path d="M1160 213 L1190 213" class="arrow"/>
  <path d="M1440 213 L1470 213" class="arrow"/>
  <path d="M1720 213 L1750 213" class="arrow"/>
  <path d="M2000 213 L2030 213" class="arrow"/>

  <!-- Middle row -->
  <rect x="40" y="300" width="2320" height="400" class="lane"/>
  <text x="70" y="334" class="section">WORKFLOW LAYER</text>

  <rect x="70" y="360" width="250" height="250" class="blue"/>
  <text x="195" y="392" text-anchor="middle" class="header">Auth Service</text>
  <text x="195" y="420" text-anchor="middle" class="body">POST /auth/login</text>
  <text x="195" y="442" text-anchor="middle" class="body">POST /auth/signup</text>
  <text x="195" y="464" text-anchor="middle" class="body">JWT token issuance</text>
  <text x="195" y="486" text-anchor="middle" class="body">User role lookup</text>
  <rect x="92" y="516" width="206" height="74" class="pill"/>
  <text x="195" y="544" text-anchor="middle" class="note">Data: users collection</text>
  <text x="195" y="565" text-anchor="middle" class="micro">localStorage auth_token on frontend</text>

  <rect x="350" y="360" width="250" height="250" class="green"/>
  <text x="475" y="392" text-anchor="middle" class="header">Inspection Upload</text>
  <text x="475" y="420" text-anchor="middle" class="body">POST /predict</text>
  <text x="475" y="442" text-anchor="middle" class="body">POST /predict/batch</text>
  <text x="475" y="464" text-anchor="middle" class="body">Save videos + metadata</text>
  <text x="475" y="486" text-anchor="middle" class="body">Create session + batch</text>
  <rect x="372" y="516" width="206" height="74" class="pill"/>
  <text x="475" y="544" text-anchor="middle" class="note">Data: inspections, analysis_sessions</text>
  <text x="475" y="565" text-anchor="middle" class="micro">outputs/sessions/{session_id}</text>

  <rect x="630" y="360" width="250" height="250" class="purple"/>
  <text x="755" y="392" text-anchor="middle" class="header">Workflow Orchestrator</text>
  <text x="755" y="420" text-anchor="middle" class="body">pipeline_runner.py</text>
  <text x="755" y="442" text-anchor="middle" class="body">Stage transitions + resume</text>
  <text x="755" y="464" text-anchor="middle" class="body">Progress updates</text>
  <text x="755" y="486" text-anchor="middle" class="body">Human-review gates</text>
  <rect x="652" y="516" width="206" height="74" class="pill"/>
  <text x="755" y="544" text-anchor="middle" class="note">Data: inspection_sessions</text>
  <text x="755" y="565" text-anchor="middle" class="micro">status, stage, review checkpoint</text>

  <rect x="910" y="360" width="250" height="250" class="amber"/>
  <text x="1035" y="392" text-anchor="middle" class="header">Event Bus</text>
  <text x="1035" y="420" text-anchor="middle" class="body">Queue / stream / async job</text>
  <text x="1035" y="442" text-anchor="middle" class="body">Dispatch model hits</text>
  <text x="1035" y="464" text-anchor="middle" class="body">Progress fan-out</text>
  <text x="1035" y="486" text-anchor="middle" class="body">Retry + dead letter</text>
  <rect x="932" y="516" width="206" height="74" class="pill"/>
  <text x="1035" y="544" text-anchor="middle" class="note">Data: Redis / RabbitMQ</text>
  <text x="1035" y="565" text-anchor="middle" class="micro">current mock uses trace JSON</text>

  <rect x="1190" y="360" width="250" height="250" class="rose"/>
  <text x="1315" y="392" text-anchor="middle" class="header">AI Microservices</text>
  <text x="1315" y="420" text-anchor="middle" class="body">Frame extraction</text>
  <text x="1315" y="442" text-anchor="middle" class="body">Classification / defect detection</text>
  <text x="1315" y="464" text-anchor="middle" class="body">Temporal consistency</text>
  <text x="1315" y="486" text-anchor="middle" class="body">Unique defect extraction</text>
  <rect x="1212" y="516" width="206" height="74" class="pill"/>
  <text x="1315" y="544" text-anchor="middle" class="note">Data: pipeline outputs JSON</text>
  <text x="1315" y="565" text-anchor="middle" class="micro">mock model hits + timings</text>

  <rect x="1470" y="360" width="250" height="250" class="green"/>
  <text x="1595" y="392" text-anchor="middle" class="header">Human Review</text>
  <text x="1595" y="420" text-anchor="middle" class="body">Low confidence routing</text>
  <text x="1595" y="442" text-anchor="middle" class="body">Approve / reject / correct</text>
  <text x="1595" y="464" text-anchor="middle" class="body">Audit trail + feedback</text>
  <text x="1595" y="486" text-anchor="middle" class="body">Resume pipeline</text>
  <rect x="1492" y="516" width="206" height="74" class="pill"/>
  <text x="1595" y="544" text-anchor="middle" class="note">Data: assessment_audit_trail</text>
  <text x="1595" y="565" text-anchor="middle" class="micro">review_checkpoint = confidence_review</text>

  <rect x="1750" y="360" width="250" height="250" class="blue"/>
  <text x="1875" y="392" text-anchor="middle" class="header">Explain + Estimate</text>
  <text x="1875" y="420" text-anchor="middle" class="body">Explainability service</text>
  <text x="1875" y="442" text-anchor="middle" class="body">Cost estimation service</text>
  <text x="1875" y="464" text-anchor="middle" class="body">Repair plan generation</text>
  <text x="1875" y="486" text-anchor="middle" class="body">Report generation</text>
  <rect x="1772" y="516" width="206" height="74" class="pill"/>
  <text x="1875" y="544" text-anchor="middle" class="note">Data: repair JSON + DOCX</text>
  <text x="1875" y="565" text-anchor="middle" class="micro">document_path saved to session</text>

  <rect x="2030" y="360" width="250" height="250" class="slate"/>
  <text x="2155" y="392" text-anchor="middle" class="header">Analytics Service</text>
  <text x="2155" y="420" text-anchor="middle" class="body">Dashboard metrics</text>
  <text x="2155" y="442" text-anchor="middle" class="body">Defect trends</text>
  <text x="2155" y="464" text-anchor="middle" class="body">Fleet health score</text>
  <text x="2155" y="486" text-anchor="middle" class="body">Operational KPIs</text>
  <rect x="2052" y="516" width="206" height="74" class="pill"/>
  <text x="2155" y="544" text-anchor="middle" class="note">Data: analytics_snapshot.json</text>
  <text x="2155" y="565" text-anchor="middle" class="micro">feeds dashboard endpoints</text>

  <path d="M320 485 L350 485" class="arrow"/>
  <path d="M600 485 L630 485" class="arrowPurple"/>
  <path d="M880 485 L910 485" class="arrowAmber"/>
  <path d="M1160 485 L1190 485" class="arrow"/>
  <path d="M1440 485 L1470 485" class="arrowGreen"/>
  <path d="M1720 485 L1750 485" class="arrow"/>
  <path d="M2000 485 L2030 485" class="arrowGreen"/>

  <!-- Lower row -->
  <rect x="40" y="730" width="2320" height="360" class="lane"/>
  <text x="70" y="764" class="section">DATA, STORAGE, AND OBSERVABILITY</text>

  <rect x="70" y="800" width="340" height="150" class="blue"/>
  <text x="240" y="832" text-anchor="middle" class="header">MongoDB</text>
  <text x="240" y="858" text-anchor="middle" class="body">users, inspection_sessions</text>
  <text x="240" y="880" text-anchor="middle" class="body">analysis_sessions, audit trail</text>
  <text x="240" y="902" text-anchor="middle" class="body">vessels, drydock visits, defects</text>

  <rect x="440" y="800" width="340" height="150" class="green"/>
  <text x="610" y="832" text-anchor="middle" class="header">Object Storage</text>
  <text x="610" y="858" text-anchor="middle" class="body">uploads, frames, reports</text>
  <text x="610" y="880" text-anchor="middle" class="body">thumbnails, evidence images</text>
  <text x="610" y="902" text-anchor="middle" class="body">downloadable DOCX / PDF</text>

  <rect x="810" y="800" width="340" height="150" class="amber"/>
  <text x="980" y="832" text-anchor="middle" class="header">Redis / Queue</text>
  <text x="980" y="858" text-anchor="middle" class="body">rate limits, locks, sessions</text>
  <text x="980" y="880" text-anchor="middle" class="body">progress state, websocket rooms</text>
  <text x="980" y="902" text-anchor="middle" class="body">async pipeline events</text>

  <rect x="1180" y="800" width="340" height="150" class="purple"/>
  <text x="1350" y="832" text-anchor="middle" class="header">Pipeline Trace File</text>
  <text x="1350" y="858" text-anchor="middle" class="body">pipeline_trace.json</text>
  <text x="1350" y="880" text-anchor="middle" class="body">every request, response, latency</text>
  <text x="1350" y="902" text-anchor="middle" class="body">issues and warnings per stage</text>

  <rect x="1550" y="800" width="340" height="150" class="rose"/>
  <text x="1720" y="832" text-anchor="middle" class="header">Backend Logs</text>
  <text x="1720" y="858" text-anchor="middle" class="body">loguru backend.log</text>
  <text x="1720" y="880" text-anchor="middle" class="body">model key hit lines</text>
  <text x="1720" y="902" text-anchor="middle" class="body">errors, retries, stage timing</text>

  <rect x="1920" y="800" width="410" height="150" class="slate"/>
  <text x="2125" y="832" text-anchor="middle" class="header">Frontend Visualizations</text>
  <text x="2125" y="858" text-anchor="middle" class="body">Dashboard, progress page, human review</text>
  <text x="2125" y="880" text-anchor="middle" class="body">Trace endpoint, history, reports</text>
  <text x="2125" y="902" text-anchor="middle" class="body">Live queue polling and inspection detail</text>

  <path d="M240 730 C240 700, 240 690, 240 650" class="arrow"/>
  <path d="M610 730 C610 700, 610 690, 610 650" class="arrow"/>
  <path d="M980 730 C980 700, 980 690, 980 650" class="arrow"/>
  <path d="M1350 730 C1350 700, 1350 690, 1350 650" class="arrow"/>
  <path d="M1720 730 C1720 700, 1720 690, 1720 650" class="arrow"/>
  <path d="M2125 730 C2125 700, 2125 690, 2125 650" class="arrow"/>

  <!-- Bottom flow notes -->
  <rect x="70" y="995" width="2260" height="62" class="lane"/>
  <text x="100" y="1029" class="note">End-to-end flow:</text>
  <text x="250" y="1029" class="small">Login → token stored → upload videos → create session → frame extraction → dummy model hit logs → confidence gate → human review if needed → repair estimate → explainability → report generation → analytics update → frontend progress + trace views</text>

  <path d="M1210 690 C1210 735, 1210 745, 1210 800" class="arrowAmber"/>
  <path d="M1595 610 C1595 690, 1595 705, 1595 800" class="arrowGreen"/>
  <path d="M1875 610 C1875 690, 1875 705, 1875 800" class="arrow"/>
  <path d="M755 610 C755 690, 755 705, 755 800" class="arrowPurple"/>
</svg>
